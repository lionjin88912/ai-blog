<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Blog 部落格</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20256%20256%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22bg%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23FF7A59%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23E23744%22%2F%3E%3C%2FlinearGradient%3E%3ClinearGradient%20id%3D%22pen%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23FFD36B%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23F5A623%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20x%3D%228%22%20y%3D%228%22%20width%3D%22240%22%20height%3D%22240%22%20rx%3D%2254%22%20fill%3D%22url%28%23bg%29%22%2F%3E%3Crect%20x%3D%2260%22%20y%3D%2252%22%20width%3D%22112%22%20height%3D%22150%22%20rx%3D%2214%22%20fill%3D%22%23fff%22%2F%3E%3Crect%20x%3D%2280%22%20y%3D%2282%22%20width%3D%2272%22%20height%3D%2211%22%20rx%3D%225.5%22%20fill%3D%22%23FBC0B4%22%2F%3E%3Crect%20x%3D%2280%22%20y%3D%22106%22%20width%3D%2272%22%20height%3D%2211%22%20rx%3D%225.5%22%20fill%3D%22%23FBC0B4%22%2F%3E%3Crect%20x%3D%2280%22%20y%3D%22130%22%20width%3D%2248%22%20height%3D%2211%22%20rx%3D%225.5%22%20fill%3D%22%23FBC0B4%22%2F%3E%3Cg%20transform%3D%22rotate%2845%20168%20168%29%22%3E%3Crect%20x%3D%22150%22%20y%3D%22150%22%20width%3D%2226%22%20height%3D%2286%22%20rx%3D%226%22%20fill%3D%22url%28%23pen%29%22%2F%3E%3Crect%20x%3D%22150%22%20y%3D%22150%22%20width%3D%2226%22%20height%3D%2214%22%20fill%3D%22%23F48FB1%22%2F%3E%3Cpath%20d%3D%22M150%20236%20L163%20258%20L176%20236%20Z%22%20fill%3D%22%235A4632%22%2F%3E%3Cpath%20d%3D%22M158%20244%20L163%20252%20L168%20244%20Z%22%20fill%3D%22%232B2B2B%22%2F%3E%3C%2Fg%3E%3Cpath%20d%3D%22M188%2066C190%2084%20196%2090%20214%2092C196%2094%20190%20100%20188%20118C186%20100%20180%2094%20162%2092C180%2090%20186%2084%20188%2066Z%22%20fill%3D%22%23FFE08A%22%2F%3E%3C%2Fsvg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background: #1e1e2e;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #top-bar {
      height: 36px;
      background: #181825;
      color: #cdd6f4;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      border-bottom: 1px solid #313244;
      user-select: none;
    }

    #top-bar .title {
      flex: 1;
    }

    #top-bar .status {
      font-size: 12px;
      color: #a6adc8;
    }

    #main-wrap {
      flex: 1;
      min-height: 0;
    }

    #terminal-container {
      height: 100%;
    }

    /* Context menu */
    #ctx-menu {
      display: none;
      position: fixed;
      z-index: 1000;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 4px 0;
      min-width: 160px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }

    #ctx-menu.show {
      display: block;
    }

    #ctx-menu .item {
      padding: 6px 16px;
      color: #cdd6f4;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #ctx-menu .item:hover {
      background: #45475a;
    }

    #ctx-menu .item .shortcut {
      color: #6c7086;
      font-size: 11px;
      margin-left: 24px;
    }

    #ctx-menu .sep {
      height: 1px;
      background: #45475a;
      margin: 4px 0;
    }

    /* System badge + diagnostic export (top-right) */
    #sys-bar {
      position: fixed;
      top: 8px;
      right: 12px;
      z-index: 950;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: system-ui, sans-serif;
      font-size: 11px;
    }

    #sys-badge {
      color: #a6adc8;
      background: rgba(30, 30, 46, 0.85);
      border: 1px solid #45475a;
      border-radius: 8px;
      padding: 4px 10px;
      user-select: none;
    }

    #diag-btn {
      color: #1e1e2e;
      background: #f9e2af;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    #diag-btn:hover { filter: brightness(1.1); }
    #diag-btn:active { transform: scale(0.96); }

    /* First-run migrate dialog */
    #migrate-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(20, 20, 30, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
    }
    #migrate-overlay.show { display: flex; }
    #migrate-card {
      width: min(560px, 92vw);
      max-height: 86vh;
      overflow-y: auto;
      background: #1e1e2e;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 16px;
      padding: 28px 30px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
    }
    #migrate-card h2 { font-size: 20px; margin-bottom: 10px; }
    #migrate-desc { font-size: 13px; color: #a6adc8; line-height: 1.6; margin-bottom: 16px; }
    #migrate-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .migrate-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border: 1px solid #45475a; border-radius: 10px;
      cursor: pointer; font-size: 13px;
    }
    .migrate-item:hover { border-color: #89b4fa; }
    .migrate-item.sel { border-color: #a6e3a1; background: rgba(166, 227, 161, 0.1); }
    .migrate-item .path { word-break: break-all; }
    .migrate-item .cnt { margin-left: auto; color: #a6adc8; white-space: nowrap; }
    #migrate-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .mbtn { padding: 9px 18px; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .mbtn-ghost { background: transparent; color: #a6adc8; border: 1px solid #45475a; }
    .mbtn-primary { background: #a6e3a1; color: #1e1e2e; }
    .mbtn-primary:disabled { opacity: 0.4; cursor: default; }
    #migrate-result { font-size: 13px; margin-top: 14px; white-space: pre-wrap; line-height: 1.6; }

    /* Launch Antigravity button */
    #launch-btn {
      position: fixed;
      z-index: 900;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 56px;
      font-size: 22px;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      color: #1e1e2e;
      background: linear-gradient(135deg, #a6e3a1, #94e2d5);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 6px 32px rgba(166, 227, 161, 0.5);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s, transform 0.2s;
      letter-spacing: 1px;
    }

    #launch-btn.visible {
      opacity: 1;
      visibility: visible;
      animation: pulse 2s infinite;
    }

    #launch-btn:hover {
      transform: translateX(-50%) scale(1.08);
      box-shadow: 0 8px 40px rgba(166, 227, 161, 0.7);
    }

    #launch-btn:active {
      transform: translateX(-50%) scale(0.95);
    }

    #launch-btn.fadeout {
      opacity: 0;
      visibility: hidden;
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 6px 32px rgba(166, 227, 161, 0.5);
      }

      50% {
        box-shadow: 0 8px 48px rgba(148, 226, 213, 0.8);
      }
    }

    /* Quick-reply bar */
    #quick-bar {
      background: #181825;
      border-bottom: 1px solid #313244;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      height: auto;
      overflow: hidden;
    }

    #quick-bar:empty {
      padding: 0;
      border-bottom: none;
    }

    #quick-bar:not(:empty) {
      padding: 10px 16px;
    }

    #quick-bar .pill {
      padding: 8px 18px;
      font-size: 14px;
      font-family: system-ui, sans-serif;
      color: #cdd6f4;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    #quick-bar .pill:hover {
      background: #45475a;
      border-color: #89b4fa;
      transform: scale(1.05);
    }

    #quick-bar .pill:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>
  <div id="top-bar">
    <span class="title">📝 AI Blog 部落格</span>
    <span class="status" id="status">Connecting...</span>
  </div>
  <div id="quick-bar"></div>
  <div id="main-wrap">
    <div id="terminal-container"></div>
  </div>
  <button id="launch-btn">🚀 啟動 Antigravity</button>
  <div id="migrate-overlay">
    <div id="migrate-card">
      <h2>偵測到舊版資料</h2>
      <p id="migrate-desc">要把舊版的人格與 WordPress 設定搬過來嗎?(只讀舊資料夾,不會更動它;帳密照搬,舊版格式會自動清理)</p>
      <div id="migrate-list"></div>
      <div id="migrate-actions">
        <button id="migrate-skip" class="mbtn mbtn-ghost">略過,全新開始</button>
        <button id="migrate-go" class="mbtn mbtn-primary" disabled>匯入選取的資料夾</button>
      </div>
      <div id="migrate-result"></div>
    </div>
  </div>
  <div id="sys-bar">
    <span id="sys-badge">loading…</span>
    <button id="diag-btn" title="下載診斷包(不含任何密碼),回報問題時把檔案傳給工程師">📦 匯出診斷包</button>
  </div>
  <div id="ctx-menu">
    <div class="item" id="ctx-copy">複製<span class="shortcut">Ctrl+Shift+C</span></div>
    <div class="sep"></div>
    <div class="item" id="ctx-paste">貼上<span class="shortcut">Ctrl+Shift+V</span></div>
    <div class="item" id="ctx-paste-img">貼上截圖<span class="shortcut">Ctrl+V</span></div>
    <div class="sep"></div>
    <div class="item" id="ctx-select-all">全選<span class="shortcut">Ctrl+Shift+A</span></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    (function () {
      const term = new Terminal({
        cursorBlink: true,
        fontSize: 15,
        fontFamily: "'Cascadia Code', 'Consolas', 'Courier New', monospace",
        theme: {
          background: '#1e1e2e',
          foreground: '#cdd6f4',
          cursor: '#f5e0dc',
          selectionBackground: '#585b7066',
          black: '#45475a',
          red: '#f38ba8',
          green: '#a6e3a1',
          yellow: '#f9e2af',
          blue: '#89b4fa',
          magenta: '#f5c2e7',
          cyan: '#94e2d5',
          white: '#cdd6f4',
          brightBlack: '#9399b2',
          brightRed: '#f38ba8',
          brightGreen: '#a6e3a1',
          brightYellow: '#f9e2af',
          brightBlue: '#89b4fa',
          brightMagenta: '#f5c2e7',
          brightCyan: '#94e2d5',
          brightWhite: '#cdd6f4',
        },
      });

      const fitAddon = new FitAddon.FitAddon();
      const webLinksAddon = new WebLinksAddon.WebLinksAddon();
      term.loadAddon(fitAddon);
      term.loadAddon(webLinksAddon);
      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      const statusEl = document.getElementById('status');
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(wsProto + '//' + location.host + '/ws');
      ws.binaryType = 'arraybuffer';

      ws.onopen = function () {
        statusEl.textContent = 'Connected';
        statusEl.style.color = '#a6e3a1';
        // Send initial terminal size
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      // Single message handler: render output, then advance the launch /
      // agy-ready / quick-bar state machine. (Replaces three chained
      // ws.onmessage wrappers that were hard to follow.)
      var outputBuf = '';
      var antigravityReady = false;
      function decodeMsg(evt) {
        return (evt.data instanceof ArrayBuffer) ? new TextDecoder().decode(evt.data) : evt.data;
      }
      function msgHasNewline(evt) {
        if (evt.data instanceof ArrayBuffer) {
          var u8 = new Uint8Array(evt.data);
          for (var i = 0; i < u8.length; i++) if (u8[i] === 10) return true;
          return false;
        }
        return evt.data.indexOf('\n') !== -1;
      }
      ws.onmessage = function (evt) {
        if (evt.data instanceof ArrayBuffer) {
          term.write(new Uint8Array(evt.data));
        } else {
          term.write(evt.data);
        }
        // Decode only when a phase actually needs the text. In steady state
        // (launched + ready) the quick-bar only cares about chunks containing a
        // newline, so skip the full UTF-8 decode of frequent cursor/status
        // updates that carry none.
        if (!antigravityLaunched) {
          detectShellPrompt(decodeMsg(evt));
        } else if (!antigravityReady) {
          detectAgyReady(decodeMsg(evt));
        } else if (msgHasNewline(evt)) {
          collectMenuItems(decodeMsg(evt));
        }
      };

      ws.onclose = function () {
        statusEl.textContent = 'Disconnected';
        statusEl.style.color = '#f38ba8';
        term.write('\r\n\x1b[31m[Connection closed]\x1b[0m\r\n');
      };

      ws.onerror = function () {
        statusEl.textContent = 'Error';
        statusEl.style.color = '#f38ba8';
      };

      // Handle paste from clipboard (Ctrl+Shift+V)
      term.attachCustomKeyEventHandler(function (ev) {
        if (ev.type !== 'keydown') return true;
        if (ev.ctrlKey && ev.shiftKey && ev.key === 'V') {
          doPaste(); return false;
        }
        if (ev.ctrlKey && ev.shiftKey && ev.key === 'C') {
          doCopy(); return false;
        }
        if (ev.ctrlKey && ev.shiftKey && ev.key === 'A') {
          term.selectAll(); return false;
        }
        return true;
      });

      function doCopy() {
        var sel = term.getSelection();
        if (sel) navigator.clipboard.writeText(sel);
      }

      function doPaste() {
        navigator.clipboard.readText().then(function (text) {
          // Route through term.paste so multi-line content is wrapped in
          // bracketed-paste (ESC[200~ … ESC[201~) when agy enables it: the
          // whole block arrives as one paste instead of each newline being
          // treated as Enter (which chopped multi-line input and looked like
          // duplicated lines). onData forwards it to the PTY exactly once.
          if (text) term.paste(text);
        });
      }

      function sendImageBlob(blob) {
        const reader = new FileReader();
        reader.onload = function (e) {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'image-paste',
              data: e.target.result
            }));
            term.write('\r\n\x1b[33m[截圖已送出分析]\x1b[0m\r\n');
          }
        };
        reader.readAsDataURL(blob);
      }

      function doPasteImage() {
        navigator.clipboard.read().then(function (items) {
          for (let item of items) {
            for (let type of item.types) {
              if (type.startsWith('image/')) {
                item.getType(type).then(sendImageBlob);
                return;
              }
            }
          }
        }).catch(err => {
          console.error('Failed to read clipboard:', err);
        });
      }

      // Handle global paste — use the blob directly from the event (no permission prompt)
      window.addEventListener('paste', function (e) {
        if (e.clipboardData && e.clipboardData.items) {
          for (let item of e.clipboardData.items) {
            if (item.type.startsWith('image/')) {
              e.preventDefault();
              sendImageBlob(item.getAsFile());
              return;
            }
          }
        }
      });

      // Handle resize
      window.addEventListener('resize', function () {
        fitAddon.fit();
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        }
      });

      // Context menu
      var ctxMenu = document.getElementById('ctx-menu');

      term.element.addEventListener('contextmenu', function (ev) {
        ev.preventDefault();
        ev.stopPropagation();
        // Position menu at cursor
        var x = ev.clientX, y = ev.clientY;
        ctxMenu.style.left = x + 'px';
        ctxMenu.style.top = y + 'px';
        ctxMenu.classList.add('show');
      });

      document.addEventListener('mousedown', function (ev) {
        if (!ctxMenu.contains(ev.target)) ctxMenu.classList.remove('show');
      });
      document.addEventListener('contextmenu', function (ev) {
        if (!term.element.contains(ev.target)) ctxMenu.classList.remove('show');
      });

      document.getElementById('ctx-copy').addEventListener('click', function () {
        doCopy(); ctxMenu.classList.remove('show'); term.focus();
      });
      document.getElementById('ctx-paste').addEventListener('click', function () {
        doPaste(); ctxMenu.classList.remove('show'); term.focus();
      });
      document.getElementById('ctx-paste-img').addEventListener('click', function () {
        doPasteImage(); ctxMenu.classList.remove('show'); term.focus();
      });
      document.getElementById('ctx-select-all').addEventListener('click', function () {
        term.selectAll(); ctxMenu.classList.remove('show'); term.focus();
      });

      // --- Launch Antigravity button logic ---
      var launchBtn = document.getElementById('launch-btn');
      var shellReady = false;
      var antigravityLaunched = false;

      // Fetch server config (gemini flags etc.)
      var geminiFlags = '';
      fetch('/api/config').then(function(r) { return r.json(); }).then(function(cfg) {
        geminiFlags = cfg.geminiFlags || '';
      }).catch(function() {});

      // Version badge + diagnostic export
      fetch('/api/version').then(function(r) { return r.json(); }).then(function(v) {
        var seedTxt = (v.seed_local || v.seed || 'dev').split('-').slice(0, 2).join('-');
        document.getElementById('sys-badge').textContent = 'v' + v.exe + ' · seed ' + seedTxt;
      }).catch(function() {
        document.getElementById('sys-badge').textContent = 'version n/a';
      });
      document.getElementById('diag-btn').addEventListener('click', function () {
        window.location.href = '/api/diagnostic';
      });

      // --- First-run: offer to import personas/WordPress from an old install ---
      (function initMigrate() {
        if (localStorage.getItem('migrate-dismissed') === '1') return;
        fetch('/api/migrate/scan').then(function (r) { return r.json(); }).then(function (d) {
          var cands = (d && d.candidates) || [];
          if (!cands.length) return;
          var overlay = document.getElementById('migrate-overlay');
          var list = document.getElementById('migrate-list');
          var goBtn = document.getElementById('migrate-go');
          var result = document.getElementById('migrate-result');
          var selected = null;
          cands.forEach(function (c) {
            var el = document.createElement('div');
            el.className = 'migrate-item';
            el.innerHTML = '<span class="path"></span><span class="cnt"></span>';
            el.querySelector('.path').textContent = c.path;
            el.querySelector('.cnt').textContent = c.count + ' 個人格';
            el.addEventListener('click', function () {
              selected = c.path;
              Array.prototype.forEach.call(list.children, function (n) { n.classList.remove('sel'); });
              el.classList.add('sel');
              goBtn.disabled = false;
            });
            list.appendChild(el);
          });
          overlay.classList.add('show');

          document.getElementById('migrate-skip').addEventListener('click', function () {
            localStorage.setItem('migrate-dismissed', '1');
            overlay.classList.remove('show');
          });
          goBtn.addEventListener('click', function () {
            if (!selected) return;
            goBtn.disabled = true;
            result.textContent = '匯入中…';
            fetch('/api/migrate/run?from=' + encodeURIComponent(selected))
              .then(function (r) { return r.json(); })
              .then(function (rep) {
                if (rep.error) { result.textContent = '❌ ' + rep.error; goBtn.disabled = false; return; }
                result.textContent = '✅ 完成:匯入 ' + rep.imported + '、補齊 ' + rep.merged +
                  '、跳過 ' + rep.skipped + '、失敗 ' + rep.errored + '。舊資料夾未更動。';
                localStorage.setItem('migrate-dismissed', '1');
                setTimeout(function () { overlay.classList.remove('show'); }, 2600);
              })
              .catch(function (e) { result.textContent = '❌ ' + e; goBtn.disabled = false; });
          });
        }).catch(function () { /* scan failed — silently skip the offer */ });
      })();

      // Show the Launch button once the shell prompt appears.
      function detectShellPrompt(text) {
        outputBuf += text;
        var clean = outputBuf.replace(/\x1b\][^\x07]*\x07/g, '').replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '').replace(/\x1b[^[\]]/g, '');
        if (!shellReady && /\$\s*$/m.test(clean.slice(-500))) {
          shellReady = true;
          launchBtn.classList.add('visible');
        }
      }

      // Fallback: show button after 3 seconds regardless
      setTimeout(function () {
        if (!shellReady && !antigravityLaunched) {
          shellReady = true;
          launchBtn.classList.add('visible');
        }
      }, 3000);

      launchBtn.addEventListener('click', function () {
        if (antigravityLaunched) return;
        antigravityLaunched = true;
        launchBtn.classList.remove('visible');
        launchBtn.classList.add('fadeout');
        setTimeout(function () { launchBtn.remove(); }, 400);
        if (ws.readyState === WebSocket.OPEN) {
          // Clear SHELL + MSYSTEM for agy only: it is a native Windows binary
          // whose command sandbox needs Windows paths (C:\...). Inheriting the
          // git-bash MSYS environment made it resolve its readwrite root to "/",
          // which Windows rejects as non-absolute — so every command the agent
          // ran failed. Running agy without those makes it use native cmd.exe
          // (and the .cmd shims in sandbox/bin). Harmless no-op on macOS/Linux.
          var agyCmd = 'export PATH="$(pwd)/sandbox/antigravity:$PATH" && SHELL= MSYSTEM= agy' + (geminiFlags ? ' ' + geminiFlags : '') + '\n';
          ws.send(agyCmd);
        }
        term.focus();
      });

      // Hide button if user types anything
      term.onData(function (data) {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        }
        if (!antigravityLaunched && shellReady) {
          antigravityLaunched = true;
          launchBtn.classList.remove('visible');
          launchBtn.classList.add('fadeout');
          setTimeout(function () { launchBtn.remove(); }, 400);
        }
        // Hide quick-bar when user types
        //clearMenu();
        // Hide quick-bar when user presses Enter
        if (data === '\r' || data === '\n') clearMenu();
      });

      // --- Quick-reply bar logic ---
      var quickBar = document.getElementById('quick-bar');
      var menuBuf = '';
      var menuItems = [];    // accumulated parsed items [{key, label, isBullet}]
      var menuRenderedKey = ''; // hash of last rendered items to avoid flicker

      function clearMenu() {
        menuItems = [];
        menuRenderedKey = '';
        hideQuickBar();
      }

      function hideQuickBar() {
        quickBar.innerHTML = '';
        fitAddon.fit();
      }

      function stripAnsi(text) {
        return text.replace(/\x1b\][^\x07]*\x07/g, '')
          .replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '')
          .replace(/\x1b[^[\]]/g, '')
          .replace(/[\x00-\x08\x0e-\x1f]/g, '');
      }

      // Parse a text chunk and push new items into menuItems (deduped by key)
      function collectMenuItems(text) {
        var clean = stripAnsi(text);
        var lines = clean.split(/[\r\n]+/);
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          // Skip table rows (contain |) and separator lines (---)
          if (/\|/.test(line) || /^[-=]{3,}$/.test(line)) continue;
          if (/^\*\*/.test(line)) continue;
          // Skip markdown checkboxes, headers, and status lines
          if (/^\[[ x]\]/.test(line) || /^#+\s/.test(line)) continue;
          var key = null, desc = '', isBullet = false;
          // Pattern 1: emoji keycap numbers 1️⃣~9️⃣
          var m = line.match(/([1-9])\uFE0F?\u20E3\s*(.{2,})/);
          if (m) { key = m[1]; desc = m[2].slice(0, 30); }
          // Pattern 2: number followed by delimiters/spaces, or preceded by dash (- [N] desc)
          if (!key) {
            m = line.match(/^\s*-?\s*\[?([1-9])\]?[.):\u25c6\s]+(.{2,})/);
            if (m) { key = m[1]; desc = m[2].slice(0, 30); }
          }
          // Validate: must contain CJK or meaningful English
          if (key && (!/[\u4e00-\u9fff\u3400-\u4dbf]/.test(desc) && !/[a-zA-Z]{2,}/.test(desc))) {
            key = null;
          }
          if (key) {
            // Update existing item (label may get longer as streaming completes)
            var label = key + '. ' + desc.replace(/^[\s\u25c6.):]+/, '');
            // If desc contains 「...」, send the quoted text instead of the number
            var sendText = null;
            var qm = desc.match(/[\u300c\u300e](.{2,}?)[\u300d\u300f]/);
            if (qm) sendText = qm[1];
            var found = false;
            for (var j = 0; j < menuItems.length; j++) {
              if (menuItems[j].key === key) {
                if (label.length > menuItems[j].label.length) {
                  menuItems[j].label = label;
                  if (sendText) menuItems[j].sendText = sendText;
                }
                found = true; break;
              }
            }
            if (!found) {
              menuItems.push({ key: key, label: label, isBullet: false, sendText: sendText });
            }
            continue;
          }
          // Pattern 3: bullet items  * 「...」 or - 「...」 or 「...」 (with optional leading whitespace/bullet/dash)
          m = line.match(/^[\s*\-]*[\u300c\u300e\u201c\u201f"](.{2,}?)[\u300d\u300f\u201d"]\s*$/);
          if (m) {
            var txt = m[1].slice(0, 30);
            var bkey = 'b_' + txt;
            var exists = false;
            for (var j = 0; j < menuItems.length; j++) {
              if (menuItems[j].key === bkey) { exists = true; break; }
            }
            if (!exists) {
              menuItems.push({ key: bkey, label: '* ' + txt, isBullet: true, sendText: m[1] });
            }
          }
        }
      }

      function renderQuickBar(items) {
        quickBar.innerHTML = '';
        items.forEach(function (item) {
          var btn = document.createElement('button');
          btn.className = 'pill';
          btn.textContent = item.label;
          btn.addEventListener('click', function () {
            if (ws.readyState === WebSocket.OPEN) {
              var input = item.sendText ? item.sendText : item.key;
              ws.send(input);
              setTimeout(function () { ws.send('\r'); }, 100);
            }
            clearMenu();
            term.focus();
          });
          quickBar.appendChild(btn);
        });
        // quickBar is always visible; layout auto-adjusts via flexbox
        fitAddon.fit();
      }

      // --- Poll: every 500ms check menuItems and update bar ---
      setInterval(function () {
        if (menuItems.length < 2) return;
        // Sort: numbered first, then bullets
        var sorted = menuItems.slice().sort(function (a, b) {
          if (a.isBullet !== b.isBullet) return a.isBullet ? 1 : -1;
          return (a.key < b.key) ? -1 : (a.key > b.key) ? 1 : 0;
        }).slice(0, 12);
        var newKey = sorted.map(function (i) { return i.key + ':' + i.label; }).join('|');
        if (newKey !== menuRenderedKey) {
          menuRenderedKey = newKey;
          renderQuickBar(sorted);
        }
      }, 500);

      // Once agy prints its ready banner, auto-send the opening greeting.
      // (Called from the single ws.onmessage handler above.)
      function detectAgyReady(text) {
        menuBuf += text;
        if (/\? for shortcuts/.test(stripAnsi(menuBuf))) {
          antigravityReady = true;
          menuBuf = '';
          setTimeout(function () {
            if (ws.readyState === WebSocket.OPEN) {
              ws.send('你好，請照 GEMINI.md 的第一次互動流程開始');
              setTimeout(function () { ws.send('\r'); }, 100);
            }
          }, 300);
        }
      }

      // Focus terminal on load
      term.focus();
    })();
  </script>
</body>
